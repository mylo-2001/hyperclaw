# xcodegen project spec
name: HyperClaw
options:
  bundleIdPrefix: ai.hyperclaw
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: swift
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: ai.hyperclaw.app

targets:
  HyperClaw:
    type: application
    platform: iOS
    sources:
      - path: HyperClaw/Sources
    resources:
      - path: HyperClaw/Resources
    info:
      path: HyperClaw/Resources/Info.plist
      properties:
        CFBundleDisplayName: HyperClaw
        CFBundleShortVersionString: "4.0.1"
        NSMicrophoneUsageDescription: "Voice calls with your AI agent"
        NSSpeechRecognitionUsageDescription: "Transcribe speech into messages for your HyperClaw agent"
        NSLocalNetworkUsageDescription: "Connect to your local HyperClaw gateway"
        NSBonjourServices:
          - "_hyperclaw._tcp"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.hyperclaw.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
