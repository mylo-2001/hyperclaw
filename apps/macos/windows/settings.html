<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — HyperClaw</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; background: #0a0f1a; color: #e2e8f0; min-width: 400px; }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 20px; color: #06b6d4; }
    section { margin-bottom: 24px; }
    section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin: 0 0 12px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 14px; margin-bottom: 12px; }
    .row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    input[type="checkbox"] { width: 18px; height: 18px; accent-color: #06b6d4; }
    button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #06b6d4; color: #0a0f1a; }
    button.secondary { background: #334155; color: #e2e8f0; }
    .hint { font-size: 11px; color: #64748b; margin-top: -4px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Settings</h1>
  <section>
    <h2>Gateway</h2>
    <label>Gateway URL</label>
    <input type="text" id="url" placeholder="http://localhost:18789">
    <label>Auth Token</label>
    <input type="password" id="token" placeholder="Optional">
    <p class="hint">hyperclaw gateway config --regenerate-token</p>
  </section>
  <section>
    <h2>Preferences</h2>
    <div class="row"><input type="checkbox" id="launchAtLogin"><label for="launchAtLogin" style="margin:0">Launch at login</label></div>
    <div class="row"><input type="checkbox" id="notifications" checked><label for="notifications" style="margin:0">Desktop notifications</label></div>
  </section>
  <section>
    <button id="save">Save</button>
    <button class="secondary" id="close">Close</button>
  </section>
  <script>
    (async () => {
      document.getElementById('url').value = await window.hyperclaw.store.get('gatewayUrl') || 'http://localhost:18789';
      document.getElementById('token').value = await window.hyperclaw.store.get('authToken') || '';
      document.getElementById('launchAtLogin').checked = await window.hyperclaw.store.get('launchAtLogin') || false;
      document.getElementById('notifications').checked = await window.hyperclaw.store.get('notifications') !== false;
    })();
    document.getElementById('save').onclick = async () => {
      await window.hyperclaw.store.set('gatewayUrl', document.getElementById('url').value.trim() || 'http://localhost:18789');
      await window.hyperclaw.store.set('authToken', document.getElementById('token').value);
      await window.hyperclaw.store.set('launchAtLogin', document.getElementById('launchAtLogin').checked);
      await window.hyperclaw.store.set('notifications', document.getElementById('notifications').checked);
      window.hyperclaw.send('settings:saved');
    };
    document.getElementById('close').onclick = () => window.close();
  </script>
</body>
</html>
