<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat — HyperClaw</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif; background: #0a0f1a; color: #e2e8f0; display: flex; flex-direction: column; height: 100vh; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.user { align-self: flex-end; background: #06b6d4; color: #0a0f1a; }
    .msg.assistant { align-self: flex-start; background: #1e293b; border: 1px solid #334155; }
    .msg pre { white-space: pre-wrap; font-size: 12px; margin: 8px 0 0; }
    #input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #334155; }
    #input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #fff; font-size: 14px; }
    #input:focus { outline: none; border-color: #06b6d4; }
    #send { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; background: #06b6d4; color: #0a0f1a; }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 11px; color: #64748b; padding: 4px 16px; }
  </style>
</head>
<body>
  <div id="messages"></div>
  <div id="status"></div>
  <div id="input-row">
    <input id="input" type="text" placeholder="Type a message..." autocomplete="off">
    <button id="send">Send</button>
  </div>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    let streamingDiv = null;

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function appendMsg(role, content) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = content.replace(/\n/g, '<br>').replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    (async () => {
      const msgs = await window.hyperclaw.chat.getStored();
      (msgs || []).forEach(m => appendMsg(m.role, m.content || ''));
    })();

    window.hyperclaw.chat.onResponse((content) => {
      if (streamingDiv) { streamingDiv.innerHTML = esc(content).replace(/\n/g, '<br>'); streamingDiv = null; }
      else appendMsg('assistant', content || '');
      window.hyperclaw.chat.appendStored('assistant', content || '');
      sendBtn.disabled = false;
      statusEl.textContent = '';
    });
    window.hyperclaw.chat.onChunk((token) => {
      if (!streamingDiv) streamingDiv = appendMsg('assistant', '');
      streamingDiv.textContent = (streamingDiv.textContent || '') + token;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });

    async function doSend() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      appendMsg('user', text);
      window.hyperclaw.chat.appendStored('user', text);
      sendBtn.disabled = true;
      statusEl.textContent = 'Sending…';
      const ok = await window.hyperclaw.chat.send(text);
      if (!ok) { statusEl.textContent = 'Not connected'; sendBtn.disabled = false; appendMsg('assistant', '_Gateway unreachable. Start: hyperclaw daemon start_'); }
    }
    sendBtn.onclick = doSend;
    inputEl.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } };
  </script>
</body>
</html>
