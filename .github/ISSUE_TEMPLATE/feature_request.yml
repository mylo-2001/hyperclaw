name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "I always have to manually copy-paste my Telegram messages..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      placeholder: "Add an auto-forward option in the channel settings..."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / onboarding wizard
        - Gateway
        - AI providers
        - Channels (Telegram, Discord, etc.)
        - Voice / TTS
        - Canvas / A2UI
        - PC Access / tools
        - Docker / deployment
        - macOS app
        - iOS app
        - Android app
        - Documentation
        - Other
    validations:
      required: true
