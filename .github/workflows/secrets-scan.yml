name: Secret Scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for new secrets not in baseline
        run: |
          # Run a fresh scan (no --baseline update so we don't modify the file)
          detect-secrets scan \
            --exclude-files '.*\.lock$' \
            --exclude-files 'node_modules/.*' \
            --exclude-files '\.secrets\.baseline' \
            --exclude-files 'env\.example' \
            --exclude-files '.*\.test\.ts$' \
            --exclude-files '.*\.test\.js$' \
            --exclude-files 'docs/.*' \
            > /tmp/current-scan.json

          python3 - <<'PYEOF'
          import json, sys

          with open('/tmp/current-scan.json') as f:
              scan = json.load(f)

          try:
              with open('.secrets.baseline') as f:
                  baseline = json.load(f)
          except FileNotFoundError:
              baseline = {'results': {}}

          baseline_results = baseline.get('results', {})
          scan_results = scan.get('results', {})

          # Build a set of (file, line_number, type) already in baseline
          known = set()
          for filepath, findings in baseline_results.items():
              for finding in findings:
                  known.add((filepath, finding.get('line_number'), finding.get('type')))

          new_secrets = []
          for filepath, findings in scan_results.items():
              for finding in findings:
                  key = (filepath, finding.get('line_number'), finding.get('type'))
                  if key not in known:
                      new_secrets.append(f"  {filepath}:{finding.get('line_number', '?')} [{finding.get('type', 'unknown')}]")

          if new_secrets:
              print("New potential secrets found (not in baseline):")
              for item in new_secrets:
                  print(item)
              print()
              print("To update the baseline after reviewing:")
              print("  pip install detect-secrets")
              print("  detect-secrets scan > .secrets.baseline")
              print("  detect-secrets audit .secrets.baseline")
              print("  git add .secrets.baseline && git commit -m 'chore: update secrets baseline'")
              sys.exit(1)
          else:
              print("No new secrets detected. OK.")
          PYEOF
