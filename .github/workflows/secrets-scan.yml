name: Secret Scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets (all files on push to main)
        if: github.event_name == 'push'
        run: |
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '.*\.lock$' \
            --exclude-files 'node_modules/.*' \
            --exclude-files '\.secrets\.baseline'

      - name: Scan for secrets (changed files on PR)
        if: github.event_name == 'pull_request'
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          if [ -n "$BASE" ]; then
            CHANGED=$(git diff --name-only "$BASE" HEAD | tr '\n' ' ')
            if [ -n "$CHANGED" ]; then
              detect-secrets scan $CHANGED \
                --baseline .secrets.baseline \
                --exclude-files '.*\.lock$' \
                --exclude-files 'node_modules/.*'
            else
              echo "No changed files — skipping scan."
            fi
          else
            detect-secrets scan \
              --baseline .secrets.baseline \
              --exclude-files '.*\.lock$' \
              --exclude-files 'node_modules/.*'
          fi

      - name: Check baseline for unreviewed secrets
        run: |
          python - <<'EOF'
          import json, sys

          try:
              with open('.secrets.baseline') as f:
                  baseline = json.load(f)
          except FileNotFoundError:
              print("No .secrets.baseline found — please run: detect-secrets scan > .secrets.baseline")
              sys.exit(1)

          results = baseline.get('results', {})
          unreviewed = []
          for filepath, findings in results.items():
              for finding in findings:
                  # is_verified=False + is_secret not set means unreviewed
                  if finding.get('is_secret') is None and not finding.get('is_verified', False):
                      unreviewed.append(f"  {filepath}:{finding.get('line_number', '?')}")

          if unreviewed:
              print("Unreviewed potential secrets found:")
              for item in unreviewed:
                  print(item)
              print()
              print("Run: detect-secrets audit .secrets.baseline")
              print("Mark each as real secret or false positive, then commit the updated baseline.")
              sys.exit(1)
          else:
              print("All secrets in baseline have been reviewed. OK.")
          EOF
