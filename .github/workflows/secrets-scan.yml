name: Secret Scanning

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --exclude-files '.*\.lock$' \
            --exclude-files 'node_modules/.*' \
            --exclude-files '\.secrets\.baseline' \
            --exclude-files 'env\.example' \
            --exclude-files '.*\.test\.(ts|js)$' \
            --exclude-files 'docs/.*' \
            --exclude-files 'CHANGELOG.*' \
            --exclude-files '.*\.md$' \
            > /tmp/scan.json
          echo "Scan complete"

      - name: Compare against baseline
        run: |
          python3 - << 'EOF'
import json, sys

with open('/tmp/scan.json') as f:
    scan = json.load(f)

try:
    with open('.secrets.baseline') as f:
        baseline = json.load(f)
except FileNotFoundError:
    baseline = {}

known = set()
for fp, findings in baseline.get('results', {}).items():
    for finding in findings:
        known.add((fp, finding.get('line_number'), finding.get('type')))

new_secrets = []
for fp, findings in scan.get('results', {}).items():
    for finding in findings:
        key = (fp, finding.get('line_number'), finding.get('type'))
        if key not in known:
            new_secrets.append(
                '  ' + fp + ':' + str(finding.get('line_number', '?')) +
                ' [' + finding.get('type', 'unknown') + ']'
            )

if new_secrets:
    print('New potential secrets found (not in baseline):')
    for item in new_secrets:
        print(item)
    print()
    print('Update the baseline: detect-secrets scan > .secrets.baseline && git add .secrets.baseline')
    sys.exit(1)
else:
    print('No new secrets. OK.')
EOF
