# Publish macOS app to GitHub Releases for auto-update.
# Trigger: git tag v* (e.g. v4.0.1)
# Requires: GITHUB_TOKEN (automatic) or GH_TOKEN with repo scope
name: macOS Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run macos:build
      - name: Generate appcast
        run: npm --prefix apps/macos run appcast
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          APP_VERSION: ${{ github.ref_name }}
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/macos/dist/*.dmg
            apps/macos/dist/*.zip
            apps/macos/dist/appcast.xml
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
