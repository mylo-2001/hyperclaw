name: macOS App Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/macos/**'
      - '!apps/macos/**/*.md'
      - '!apps/macos/docs/**'
  pull_request:
    paths:
      - 'apps/macos/**'
      - '!apps/macos/**/*.md'
      - '!apps/macos/docs/**'

jobs:
  test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/macos
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --ignore-scripts --legacy-peer-deps
      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/macos
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: 0
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build macOS app
        run: npm run build:mac
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hyperclaw-macos
          path: |
            apps/macos/dist/*.dmg
            apps/macos/dist/*.zip
            apps/macos/dist/mac/
