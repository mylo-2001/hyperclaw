name: macOS App Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/macos/**'
      - '.github/workflows/macos-build.yml'
  pull_request:
    paths:
      - 'apps/macos/**'

jobs:
  test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Build macOS app
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: hyperclaw-macos
          path: |
            apps/macos/dist/*.dmg
            apps/macos/dist/*.zip
            apps/macos/dist/mac/
