# HyperClaw — multi-image stack
#
# Quick start:
#   cp env.example .env        # copy the template
#   nano .env                  # fill in your API keys
#   docker-compose up -d gateway
#
# Profiles:
#   docker-compose up -d gateway          # production gateway (default)
#   docker-compose --profile sandbox up -d sandbox   # sandboxed agent (no PC tools)
#   docker-compose --profile browser up -d gateway-browser  # gateway + Puppeteer

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: hyperclaw:gateway
    ports:
      - "18789:18789"
    volumes:
      - hyperclaw-data:/root/.hyperclaw
    env_file:
      - .env                   # copy env.example → .env and fill in your keys
    environment:
      - NODE_ENV=production
      - HYPERCLAW_PORT=18789
      - HYPERCLAW_BIND=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: hyperclaw:sandbox
    profiles:
      - sandbox
    volumes:
      - hyperclaw-data:/root/.hyperclaw
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HYPERCLAW_SANDBOX=1
      - HYPERCLAW_PORT=18789
      - HYPERCLAW_BIND=0.0.0.0
    restart: unless-stopped

  # Optional: gateway with Puppeteer (Chromium) for browser tools
  gateway-browser:
    build:
      context: .
      dockerfile: Dockerfile.browser
    image: hyperclaw:gateway-browser
    profiles:
      - browser
    ports:
      - "18790:18789"
    volumes:
      - hyperclaw-data:/root/.hyperclaw
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HYPERCLAW_PORT=18789
      - HYPERCLAW_BIND=0.0.0.0
    restart: unless-stopped

volumes:
  hyperclaw-data:
