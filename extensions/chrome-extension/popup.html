<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperClaw</title>
  <style>
    body { width: 320px; background: #0a0f1a; color: #e2e8f0; font-family: Inter, sans-serif; margin: 0; }
    .header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #1f2937; }
    .logo { font-size: 20px; }
    .title { font-weight: 700; color: #06b6d4; font-size: 14px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
    .status-dot.online { background: #06b6d4; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .status { font-size: 11px; color: #6b7280; margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .body { padding: 12px 16px; }
    .input-row { display: flex; gap: 6px; margin-bottom: 8px; }
    input { flex: 1; background: #111827; border: 1px solid #374151; color: white; border-radius: 8px; padding: 8px 12px; font-size: 13px; outline: none; }
    input:focus { border-color: #06b6d4; }
    button { background: #0e7490; color: white; border: none; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    button:hover { background: #06b6d4; }
    .actions { display: flex; flex-direction: column; gap: 6px; }
    .action-btn { background: #111827; border: 1px solid #1f2937; color: #9ca3af; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; text-align: left; display: flex; align-items: center; gap: 8px; }
    .action-btn:hover { border-color: #06b6d4; color: #e2e8f0; }
    .log { font-family: monospace; font-size: 10px; color: #4b5563; padding: 8px; background: #111827; border-radius: 6px; margin-top: 8px; max-height: 80px; overflow-y: auto; border: 1px solid #1f2937; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🦅</span>
    <span class="title">HyperClaw</span>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </div>
  <div class="body">
    <div class="input-row">
      <input type="text" id="msgInput" placeholder="Ask HyperClaw..." />
      <button id="sendBtn">↑</button>
    </div>
    <div class="actions">
      <button class="action-btn" id="sharePageBtn">📄 Share current page with agent</button>
      <button class="action-btn" id="shareSelectionBtn">✂️ Share selected text</button>
      <button class="action-btn" id="openWebUIBtn">🌐 Open Web UI</button>
    </div>
    <div class="log" id="log">Connecting to gateway...</div>
  </div>
  <script src="src/popup.js"></script>
</body>
</html>
